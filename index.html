      <img src="logo.png" alt="طيور الحلال">

    <div class="login-subtitle">أدخل رمز الدخول للمتابعة</div>

    <div class="otp-inputs" id="otpInputs">
      <input type="tel" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="0">

      <input type="tel" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="2">
      <input type="tel" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="3">
      <input type="tel" class="otp-input" maxlength="1" inputmode="numeric" pattern="[0-9]" data-index="4">

  <header class="header">
    <div class="header-inner">

      <div class="logo-section">
        <div class="logo-icon">
          <img src="logo.png" alt="طيور الحلال">
        </div>

        <div>
         
        </div>
      </div>

      <nav class="nav-scroll" id="mainNav">
        <button class="nav-btn active" data-page="prices">الأسعار</button>
        <button class="nav-btn" data-page="agents">المناديب</button>
        <button class="nav-btn" data-page="clients">العملاء</button>
        <button class="nav-btn" data-page="inventory">المخزن</button>
        <button class="nav-btn" data-page="expenses">المصروفات</button>
        <button class="nav-btn" data-page="order">أوردر</button>
        <button class="nav-btn" data-page="records">السجلات</button>
        <button class="nav-btn" data-page="daily">اليوم</button>

<div id="modalContainer" class="modal-overlay" style="display:none;">
  <div class="modal" id="modalContent"></div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script>
(function() {
  // ==================== CONSTANTS ====================
  const CORRECT_OTP = '123456';
  const STORAGE_KEYS = {
    prices: 'tuyoor_prices',
    agents: 'tuyoor_agents',
    clients: 'tuyoor_clients',
    inventory: 'tuyoor_inventory',
    inventoryLog: 'tuyoor_inventory_log',
    expenses: 'tuyoor_expenses',
    orders: 'tuyoor_orders',
    dailyDate: 'tuyoor_daily_date',
  };

  const DEFAULT_PRICES = [
    { id:'p1', name:'فراخ بيضاء', category:'قسم الدواجن الطازجة', shopPrice:101, restPrice:130 },
    { id:'p2', name:'فراخ ساسو', category:'قسم الدواجن الطازجة', shopPrice:130, restPrice:160 },
    { id:'p3', name:'فراخ حرفيومي', category:'قسم الدواجن الطازجة', shopPrice:135, restPrice:165 },
    { id:'p4', name:'وراك سوبر', category:'قسم التقطيعات', shopPrice:103, restPrice:130 },
    { id:'p5', name:'صفحة وراك', category:'قسم التقطيعات', shopPrice:90, restPrice:115 },
    { id:'p6', name:'دبابيس', category:'قسم التقطيعات', shopPrice:150, restPrice:185 },
    { id:'p7', name:'شيش وراك', category:'قسم التقطيعات', shopPrice:220, restPrice:270 },
    { id:'p8', name:'بانيه صدور', category:'قسم البانيه', shopPrice:250, restPrice:300 },
    { id:'p9', name:'بانيه شرائح', category:'قسم البانيه', shopPrice:250, restPrice:300 },
    { id:'p10', name:'استربس بانيه', category:'قسم البانيه', shopPrice:250, restPrice:300 },
    { id:'p11', name:'كبدة صافي', category:'قسم الحلويات', shopPrice:170, restPrice:210 },
    { id:'p12', name:'قوانص', category:'قسم الحلويات', shopPrice:80, restPrice:100 },
    { id:'p13', name:'جوانح', category:'قسم الحلويات', shopPrice:70, restPrice:90 },
    { id:'p14', name:'بط سوداني', category:'ركن الريف', shopPrice:160, restPrice:200 },
    { id:'p15', name:'أرانب فلاحي', category:'ركن الريف', shopPrice:135, restPrice:170 },
  ];

  // ==================== HELPERS ====================
  function loadAll() {
    try {
      return {
        prices: JSON.parse(localStorage.getItem(STORAGE_KEYS.prices)) || [...DEFAULT_PRICES],
        agents: JSON.parse(localStorage.getItem(STORAGE_KEYS.agents)) || [],
        clients: JSON.parse(localStorage.getItem(STORAGE_KEYS.clients)) || [],
        inventory: JSON.parse(localStorage.getItem(STORAGE_KEYS.inventory)) || [],
        inventoryLog: JSON.parse(localStorage.getItem(STORAGE_KEYS.inventoryLog)) || [],
        expenses: JSON.parse(localStorage.getItem(STORAGE_KEYS.expenses)) || [],
        orders: JSON.parse(localStorage.getItem(STORAGE_KEYS.orders)) || [],
        dailyDate: localStorage.getItem(STORAGE_KEYS.dailyDate) || ''
      };
    } catch(e) {
      return {
        prices: [...DEFAULT_PRICES], agents: [], clients: [], inventory: [],
        inventoryLog: [], expenses: [], orders: [], dailyDate: ''
      };
    }
  }

  function save(key, data) {
    try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {
      showToast('⚠️ ذاكرة المتصفح ممتلئة!', 'error');
    }
  }

  const getTodayString = () => new Date().toISOString().split('T')[0];
  const getNowString = () => new Date().toLocaleString('ar-EG', {
    year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', hour12:true
  });
  const uuid = () => Date.now().toString(36) + '-' + Math.random().toString(36).substring(2, 9);

  function formatPhoneForWhatsapp(phone) {
    let cleaned = String(phone).replace(/[\s\-\+\(\)]/g, '');
    if (cleaned.startsWith('00')) cleaned = cleaned.substring(2);
    if (cleaned.startsWith('0') && cleaned.length === 11) cleaned = '20' + cleaned.substring(1);
    else if (!cleaned.startsWith('20') && cleaned.length === 10) cleaned = '20' + cleaned;
    return cleaned;
  }

  function showToast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    if (!container) return;
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3000);
  }

  function closeModal() {
    document.getElementById('modalContainer').style.display = 'none';
  }

  function exportToExcel(dataArray, filename = 'export.csv') {
    if (!dataArray || dataArray.length === 0) { showToast('⚠️ لا توجد بيانات', 'error'); return; }
    const headers = Object.keys(dataArray[0]);
    let csvContent = '\uFEFF';
    csvContent += headers.map(h => `"${h}"`).join(',') + '\n';
    dataArray.forEach(row => {
      const values = headers.map(h => {
        let val = row[h] !== undefined ? String(row[h]) : '';
        val = val.replace(/"/g, '""');
        if (val.includes(',') || val.includes('\n') || val.includes('"')) val = `"${val}"`;
        else val = `"${val}"`;
        return val;
      });
      csvContent += values.join(',') + '\n';
    });
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast('✅ تم التصدير بنجاح');
  }

  async function captureElement(element, filename = 'screenshot.png') {
    try {
      const canvas = await html2canvas(element, {
        backgroundColor: '#ffffff',
        scale: 2,
        useCORS: true,
        logging: false
      });
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast('📸 تم تحميل الصورة');
    } catch(e) {
      showToast('⚠️ فشل التقاط الصورة', 'error');
    }
  }

  function addInventoryLog(itemName, type, before, after, action) {
    const data = loadAll();
    data.inventoryLog.unshift({
      id: uuid(), itemName, type, quantityBefore: before, quantityAfter: after,
      action, date: getNowString(), dateKey: getTodayString()
    });
    save(STORAGE_KEYS.inventoryLog, data.inventoryLog);
  }

  // ==================== OTP LOGIN ====================
  function initOTP() {
    const inputs = document.querySelectorAll('.otp-input');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    function checkOTPComplete() {
      let code = '';
      inputs.forEach(inp => code += inp.value);
      loginBtn.disabled = code.length !== 6;
      loginError.style.display = 'none';
      inputs.forEach(inp => inp.classList.remove('error'));
    }

    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        const val = e.target.value.replace(/[^0-9]/g, '');
        e.target.value = val;
        if (val && index < 5) {
          inputs[index + 1].focus();
        }
        checkOTPComplete();
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) {
          inputs[index - 1].focus();
        }
        if (e.key === 'Enter' && !loginBtn.disabled) {
          attemptLogin();
        }
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '').slice(0, 6);
        pasted.split('').forEach((char, i) => {
          if (inputs[i]) inputs[i].value = char;
        });
        if (pasted.length === 6) inputs[5].focus();
        checkOTPComplete();
      });
    });

    loginBtn.addEventListener('click', attemptLogin);
    if (inputs[0]) inputs[0].focus();
  }

  function attemptLogin() {
    const inputs = document.querySelectorAll('.otp-input');
    let code = '';
    inputs.forEach(inp => code += inp.value);
    const loginError = document.getElementById('loginError');

    if (code === CORRECT_OTP) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      checkDailyReset();
      navigateTo('prices');
      showToast('👋 أهلاً وسهلاً');
    } else {
      loginError.style.display = 'block';
      inputs.forEach(inp => {
        inp.classList.add('error');
        setTimeout(() => inp.classList.remove('error'), 500);
      });
      inputs.forEach(inp => inp.value = '');
      if (inputs[0]) inputs[0].focus();
      document.getElementById('loginBtn').disabled = true;
    }
  }

  window.logout = function() {
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    const inputs = document.querySelectorAll('.otp-input');
    inputs.forEach(inp => inp.value = '');
    document.getElementById('loginBtn').disabled = true;
    document.getElementById('loginError').style.display = 'none';
    if (inputs[0]) inputs[0].focus();
    currentCart = [];
  };

  // ==================== NAVIGATION ====================
  function navigateTo(pageName) {
    document.querySelectorAll('#mainNav .nav-btn').forEach(b => b.classList.remove('active'));
    const target = document.querySelector(`#mainNav [data-page="${pageName}"]`);
    if (target) target.classList.add('active');
    renderPage(pageName);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  document.getElementById('mainNav').addEventListener('click', (e) => {
    const btn = e.target.closest('.nav-btn');
    if (btn && btn.dataset.page) navigateTo(btn.dataset.page);
  });

  function renderPage(pageName) {
    const root = document.getElementById('appContent');
    if (!root) return;
    root.innerHTML = '';
    const pages = {
      prices: renderPrices,
      agents: renderAgents,
      clients: renderClients,
      inventory: renderInventory,
      expenses: renderExpensesPage,
      order: renderOrder,
      records: renderRecords,
      daily: renderDaily
    };
    if (pages[pageName]) pages[pageName](root);
  }

  // ==================== PRICES PAGE ====================
  function renderPrices(container) {
    container.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="icon-circle">💰</div>
        <div class="card-title">قائمة الأسعار</div>
      </div>
      <div style="overflow-x:auto; -webkit-overflow-scrolling:touch;">
        <table class="price-table" id="priceTable">
          <thead>
            <tr><th>المنتج</th><th>سعر المحل</th><th>سعر المطاعم</th><th>نصف ك</th><th>ربع ك</th><th>القسم</th></tr>
          </thead>
          <tbody id="priceTableBody"></tbody>
        </table>
      </div>
    </div>`;
    renderPriceTable();
  }

  function renderPriceTable() {
    const prices = loadAll().prices;
    const tbody = document.getElementById('priceTableBody');
    if (!tbody) return;
    let html = '', lastCat = '';
    prices.forEach(p => {
      if (p.category !== lastCat) {
        html += `<tr class="category-row"><td colspan="6">📌 ${p.category}</td></tr>`;
        lastCat = p.category;
      }
      html += `<tr>
        <td><strong>${p.name}</strong></td>
        <td><input type="number" class="price-input" value="${p.shopPrice}" step="0.5" data-id="${p.id}" data-type="shop" onchange="window.updatePrice(this)"></td>
        <td><input type="number" class="price-input" value="${p.restPrice}" step="0.5" data-id="${p.id}" data-type="rest" onchange="window.updatePrice(this)"></td>
        <td><span class="weight-badge">${(p.shopPrice/2).toFixed(1)} ج</span></td>
        <td><span class="weight-badge">${(p.shopPrice/4).toFixed(1)} ج</span></td>
        <td>${p.category}</td>
      </tr>`;
    });
    tbody.innerHTML = html;
  }

  window.updatePrice = function(input) {
    const id = input.dataset.id;
    const type = input.dataset.type;
    const val = parseFloat(input.value);
    if (isNaN(val) || val < 0) {
      renderPriceTable();
      showToast('⚠️ سعر غير صحيح', 'error');
      return;
    }
    const data = loadAll();
    const price = data.prices.find(p => p.id === id);
    if (price) {
      if (type === 'shop') price.shopPrice = val;
      else price.restPrice = val;
      save(STORAGE_KEYS.prices, data.prices);
      renderPriceTable();
      showToast('✅ تم تحديث السعر');
    }
  };

  // ==================== AGENTS PAGE ====================
  function renderAgents(container) {
    container.innerHTML = `
    <div class="card">
      <div class="card-header"><div class="icon-circle">🛵</div><div class="card-title">إضافة مندوب</div></div>
      <div class="form-row">
        <div><label>الاسم</label><input id="agentName" placeholder="اسم المندوب"></div>
        <div><label>الهاتف</label><input id="agentPhone" placeholder="010xxxxxxxx"></div>
        <div><button class="btn btn-primary" onclick="window.addAgent()">➕ إضافة</button></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="icon-circle">📋</div><div class="card-title">قائمة المناديب</div></div>
      <button class="btn btn-export btn-sm" onclick="window.exportAgents()" style="margin-bottom:10px;">📥 تصدير Excel</button>
      <div id="agentsList"></div>
    </div>`;
    renderAgentsList();
  }

  function renderAgentsList() {
    const agents = loadAll().agents;
    const list = document.getElementById('agentsList');
    if (!list) return;
    if (agents.length === 0) {
      list.innerHTML = '<div class="empty-state">لا يوجد مناديب</div>';
      return;
    }
    list.innerHTML = agents.map(a => `
      <div class="item-row">
        <div><strong>${a.name}</strong> 📞 ${a.phone}</div>
        <div style="display:flex;gap:4px;">
          <button class="btn btn-outline btn-xs" onclick="window.editAgent('${a.id}')">✏️</button>
          <button class="btn btn-danger btn-xs" onclick="window.deleteAgent('${a.id}')">🗑️</button>
        </div>
      </div>`).join('');
  }

  window.addAgent = () => {
    const name = document.getElementById('agentName')?.value.trim();
    const phone = document.getElementById('agentPhone')?.value.trim();
    if (!name || !phone) { showToast('⚠️ جميع الحقول مطلوبة', 'error'); return; }
    const data = loadAll();
    data.agents.push({ id: uuid(), name, phone });
    save(STORAGE_KEYS.agents, data.agents);
    document.getElementById('agentName').value = '';
    document.getElementById('agentPhone').value = '';
    renderAgentsList();
    showToast('🛵 تم إضافة المندوب');
  };

  window.editAgent = (id) => {
    const agent = loadAll().agents.find(a => a.id === id);
    if (!agent) return;
    document.getElementById('modalContent').innerHTML = `<h3 style="margin-bottom:16px;">تعديل مندوب</h3>
      <label>الاسم</label><input id="editAgentName" value="${agent.name}">
      <label style="margin-top:8px;">الهاتف</label><input id="editAgentPhone" value="${agent.phone}">
      <div class="modal-buttons">
        <button class="btn btn-primary" onclick="window.saveAgentEdit('${id}')">💾 حفظ</button>
        <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
      </div>`;
    document.getElementById('modalContainer').style.display = 'flex';
  };

  window.saveAgentEdit = (id) => {
    const name = document.getElementById('editAgentName')?.value.trim();
    const phone = document.getElementById('editAgentPhone')?.value.trim();
    if (!name || !phone) { showToast('⚠️ بيانات ناقصة', 'error'); return; }
    const data = loadAll();
    const agent = data.agents.find(a => a.id === id);
    if (agent) { agent.name = name; agent.phone = phone; save(STORAGE_KEYS.agents, data.agents); }
    closeModal();
    renderAgentsList();
    showToast('✅ تم التعديل');
  };

  window.deleteAgent = (id) => {
    if (!confirm('تأكيد حذف المندوب؟')) return;
    const data = loadAll();
    data.agents = data.agents.filter(a => a.id !== id);
    save(STORAGE_KEYS.agents, data.agents);
    renderAgentsList();
    showToast('🗑️ تم الحذف');
  };

  window.exportAgents = () => {
    const agents = loadAll().agents;
    if (!agents.length) { showToast('⚠️ لا يوجد مناديب', 'error'); return; }
    exportToExcel(agents.map(a => ({
      'الاسم': a.name,
      'الهاتف': a.phone
    })), 'المناديب.csv');
  };

  // ==================== CLIENTS PAGE ====================
  function renderClients(container) {
    container.innerHTML = `
    <div class="card">
      <div class="card-header"><div class="icon-circle">👥</div><div class="card-title">إضافة عميل</div></div>
      <div class="form-row">
        <div><label>النوع</label><select id="clientType"><option value="client">👤 عميل</option><option value="restaurant">🏢 مطعم</option></select></div>
        <div><label>الاسم</label><input id="clientName" placeholder="الاسم"></div>
        <div><label>الهاتف</label><input id="clientPhone" placeholder="الهاتف"></div>
      </div>
      <div class="form-row">
        <div><label>العنوان</label><input id="clientAddress" placeholder="العنوان"></div>
        <div style="min-width:auto;"><button class="btn btn-primary" onclick="window.addClient()">➕ إضافة</button></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="icon-circle">📋</div><div class="card-title">قائمة العملاء والمطاعم</div></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
        <button class="tab-btn active" data-filter="all" onclick="window.filterClients('all', this)">📋 الكل</button>
        <button class="tab-btn" data-filter="restaurant" onclick="window.filterClients('restaurant', this)">🏢 مطاعم</button>
        <button class="tab-btn" data-filter="client" onclick="window.filterClients('client', this)">👤 عملاء</button>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
        <input id="clientSearch" placeholder="🔍 بحث..." oninput="window.renderFilteredClients()" style="flex:1;min-width:140px;">
        <button class="btn btn-export btn-sm" onclick="window.exportClients()">📥 تصدير Excel</button>
      </div>
      <div id="clientsList"></div>
    </div>`;
    window.currentClientFilter = 'all';
    renderFilteredClients();
  }

  window.currentClientFilter = 'all';

  window.filterClients = function(filter, btn) {
    window.currentClientFilter = filter;
    document.querySelectorAll('#appContent .tab-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    renderFilteredClients();
  };

  window.renderFilteredClients = function() {
    const clients = loadAll().clients;
    const search = (document.getElementById('clientSearch')?.value || '').toLowerCase();
    const filter = window.currentClientFilter || 'all';
    let filtered = clients;
    if (filter !== 'all') filtered = filtered.filter(c => c.type === filter);
    if (search) filtered = filtered.filter(c => c.name.toLowerCase().includes(search) || c.phone.includes(search));
    const list = document.getElementById('clientsList');
    if (!list) return;
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">لا يوجد عملاء</div>';
      return;
    }
    list.innerHTML = filtered.map(c => `
      <div class="item-row">
        <div><strong>${c.type === 'restaurant' ? '🏢' : '👤'} ${c.name}</strong> 📞 ${c.phone} ${c.address ? '📍 ' + c.address : ''}</div>
        <div style="display:flex;gap:4px;">
          <button class="btn btn-outline btn-xs" onclick="window.editClient('${c.id}')">✏️</button>
          <button class="btn btn-danger btn-xs" onclick="window.deleteClient('${c.id}')">🗑️</button>
        </div>
      </div>`).join('');
  };

  window.addClient = () => {
    const type = document.getElementById('clientType')?.value;
    const name = document.getElementById('clientName')?.value.trim();
    const phone = document.getElementById('clientPhone')?.value.trim();
    const address = document.getElementById('clientAddress')?.value.trim();
    if (!name || !phone) { showToast('⚠️ الاسم والهاتف مطلوبين', 'error'); return; }
    const data = loadAll();
    data.clients.push({ id: uuid(), type, name, phone, address });
    save(STORAGE_KEYS.clients, data.clients);
    document.getElementById('clientName').value = '';
    document.getElementById('clientPhone').value = '';
    document.getElementById('clientAddress').value = '';

  // ==================== INVENTORY PAGE ====================
  function renderInventory(container) {
    container.innerHTML = `
    <div class="card">
      <div class="card-header"><div class="icon-circle">📦</div><div class="card-title">إدارة المخزن</div></div>

  function renderInventoryTable() {
    const inventory = loadAll().inventory;
    const search = (document.getElementById('invSearch')?.value || '').toLowerCase();
    const filtered = inventory.filter(i => i.name.toLowerCase().includes(search));
    const tbody = document.getElementById('invTableBody');
    if (!tbody) return;
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">لا يوجد مخزون</td></tr>';
      return;
    }
    tbody.innerHTML = filtered.map(i => `
      <tr>
        <td>${i.type === 'goods' ? '📦 بضاعة' : '🧴 مستهلكات'}</td>
        <td><strong>${i.name}</strong></td>
        <td>${i.type === 'goods' ? i.weight.toFixed(2) + ' كجم' : i.quantity + ' قطعة'}</td>
        <td><small>${i.date}</small></td>
        <td><button class="btn btn-danger btn-xs" onclick="window.deleteInventoryItem('${i.id}')">🗑️</button></td>
      </tr>`).join('');
  }

  window.deleteInventoryItem = (id) => {
    if (!confirm('تأكيد حذف العنصر؟')) return;
    const data = loadAll();
    const item = data.inventory.find(i => i.id === id);
    if (item) addInventoryLog(item.name, item.type, item.type==='goods'?item.weight:item.quantity, 0, 'حذف');
    data.inventory = data.inventory.filter(i => i.id !== id);
    save(STORAGE_KEYS.inventory, data.inventory);
    renderInventoryTable();
    showToast('🗑️ تم الحذف');

  window.exportInventory = () => {
    const inv = loadAll().inventory;
    if (!inv.length) { showToast('⚠️ المخزن فارغ', 'error'); return; }
    exportToExcel(inv.map(i => ({
      'النوع': i.type === 'goods' ? 'بضاعة' : 'مستهلكات',
      'الاسم': i.name,
      'الكمية': i.type === 'goods' ? i.weight.toFixed(2) + ' كجم' : i.quantity + ' قطعة',
      'التاريخ': i.date
    })), 'المخزن.csv');
  };

  window.showInventoryModal = (mode) => {
    document.getElementById('modalContent').innerHTML = `<h3 style="margin-bottom:16px;">${mode === 'add' ? '➕ إضافة للمخزن' : '➖ سحب من المخزن'}</h3>
      <label>النوع</label><select id="invType" onchange="window.toggleInvFields()"><option value="goods">📦 بضاعة</option><option value="consumable">🧴 مستهلكات</option></select>
      <label style="margin-top:8px;">اسم الصنف</label><input id="invName" placeholder="اسم الصنف" list="invSuggestions"><datalist id="invSuggestions"></datalist>
      <div id="invWeightField" style="margin-top:8px;"><label>الوزن (كجم)</label><input id="invWeight" type="number" step="0.001" placeholder="مثال: 5.5"></div>
      <div id="invQtyField" style="display:none;margin-top:8px;"><label>العدد</label><input id="invQty" type="number" placeholder="مثال: 10"></div>
      <div class="modal-buttons">
        <button class="btn btn-primary" onclick="${mode === 'add' ? 'window.addInventory()' : 'window.withdrawInventory()'}">${mode === 'add' ? '➕ إضافة' : '➖ سحب'}</button>
        <button class="btn btn-outline" onclick="closeModal()">إلغاء</button>
      </div>`;
    document.getElementById('modalContainer').style.display = 'flex';
    window.toggleInvFields();
    const names = [...new Set(loadAll().inventory.map(i => i.name))];
    document.getElementById('invSuggestions').innerHTML = names.map(n => `<option value="${n}">`).join('');
  };

  window.toggleInvFields = () => {
    const type = document.getElementById('invType')?.value;
    const wf = document.getElementById('invWeightField');
    const qf = document.getElementById('invQtyField');
    if (wf && qf) {
      wf.style.display = type === 'goods' ? 'block' : 'none';
      qf.style.display = type === 'consumable' ? 'block' : 'none';
    }
  };

  window.addInventory = () => {
    const type = document.getElementById('invType')?.value;
    const name = document.getElementById('invName')?.value.trim();
    if (!name) { showToast('⚠️ أدخل اسم الصنف', 'error'); return; }
    const data = loadAll();
    let existing = data.inventory.find(i => i.name === name && i.type === type);
    if (type === 'goods') {
      const weight = parseFloat(document.getElementById('invWeight')?.value);
      if (!weight || weight <= 0) { showToast('⚠️ وزن غير صحيح', 'error'); return; }
      if (existing) {
        const old = existing.weight;
        existing.weight += weight;
        existing.date = getNowString();
        addInventoryLog(name, type, old, existing.weight, 'إضافة');
      } else {
        data.inventory.push({ id: uuid(), type, name, weight, quantity: 0, date: getNowString() });
        addInventoryLog(name, type, 0, weight, 'إضافة');
      }
    } else {
      const qty = parseInt(document.getElementById('invQty')?.value);
      if (!qty || qty <= 0) { showToast('⚠️ عدد غير صحيح', 'error'); return; }
      if (existing) {
        const old = existing.quantity;
        existing.quantity += qty;
        existing.date = getNowString();
        addInventoryLog(name, type, old, existing.quantity, 'إضافة');
      } else {
        data.inventory.push({ id: uuid(), type, name, weight: 0, quantity: qty, date: getNowString() });
        addInventoryLog(name, type, 0, qty, 'إضافة');
      }
    }
    save(STORAGE_KEYS.inventory, data.inventory);
    closeModal();
    renderInventoryTable();
    showToast('✅ تمت الإضافة');
  };

  window.withdrawInventory = () => {
    const type = document.getElementById('invType')?.value;
    const name = document.getElementById('invName')?.value.trim();
    const data = loadAll();
    const item = data.inventory.find(i => i.name === name && i.type === type);
    if (!item) { showToast('⚠️ الصنف غير موجود', 'error'); return; }
    if (type === 'goods') {
      const w = parseFloat(document.getElementById('invWeight')?.value);
      if (!w || w <= 0 || item.weight < w) { showToast('⚠️ كمية غير كافية', 'error'); return; }
      const old = item.weight;
      item.weight -= w;
      item.date = getNowString();
      addInventoryLog(name, type, old, item.weight, 'سحب');
      if (item.weight <= 0.001) data.inventory = data.inventory.filter(i => i.id !== item.id);
    } else {
      const q = parseInt(document.getElementById('invQty')?.value);
      if (!q || q <= 0 || item.quantity < q) { showToast('⚠️ كمية غير كافية', 'error'); return; }
      const old = item.quantity;
      item.quantity -= q;
      item.date = getNowString();
      addInventoryLog(name, type, old, item.quantity, 'سحب');
      if (item.quantity <= 0) data.inventory = data.inventory.filter(i => i.id !== item.id);
    }
    save(STORAGE_KEYS.inventory, data.inventory);
    closeModal();
    renderInventoryTable();
    showToast('✅ تم السحب');
  };

  function renderExpensesPage(container) {
    container.innerHTML = `
    <div class="card">

      <div class="form-row">
        <div><label>اسم المصروف</label><input id="expName" placeholder="مثال: إيجار"></div>

    renderExpensesList();

  function renderExpensesList() {
    const expenses = loadAll().expenses;
    const date = document.getElementById('expFilterDate')?.value;
    const search = (document.getElementById('expFilterSearch')?.value || '').toLowerCase();
    let filtered = expenses;
    if (date) filtered = filtered.filter(e => e.dateKey === date);
    if (search) filtered = filtered.filter(e => e.name.toLowerCase().includes(search));
    const total = filtered.reduce((s, e) => s + e.amount, 0);
    const totalEl = document.getElementById('expTotalDisplay');
    if (totalEl) totalEl.textContent = total.toFixed(1);
    const list = document.getElementById('expensesList');
    if (!list) return;
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">لا توجد مصروفات</div>';
      return;
    }
    list.innerHTML = filtered.map(e => `
      <div class="item-row">
        <div><strong>${e.name}</strong> ${e.details ? '(' + e.details + ')' : ''} <small>${e.date}</small></div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-weight:700;">${e.amount.toFixed(1)} ج.م</span>
          <button class="btn btn-outline btn-xs" onclick="window.editExpense('${e.id}')">✏️</button>
          <button class="btn btn-danger btn-xs" onclick="window.deleteExpense('${e.id}')">🗑️</button>
        </div>
      </div>`).join('');
  }

  window.addExpenseFromPage = () => {
    const name = document.getElementById('expName')?.value.trim();
    const amount = parseFloat(document.getElementById('expAmount')?.value);
    const details = document.getElementById('expDetails')?.value.trim();
    if (!name || isNaN(amount) || amount <= 0) { showToast('⚠️ بيانات غير صحيحة', 'error'); return; }
    const data = loadAll();
    data.expenses.unshift({ id: uuid(), name, amount, details, date: getNowString(), dateKey: getTodayString() });
    save(STORAGE_KEYS.expenses, data.expenses);
    document.getElementById('expName').value = '';
    document.getElementById('expAmount').value = '';
    document.getElementById('expDetails').value = '';
    renderExpensesList();
    showToast('💸 تمت الإضافة');
  };

  window.editExpense = (id) => {
    const exp = loadAll().expenses.find(e => e.id === id);
    if (!exp) return;
    document.getElementById('modalContent').innerHTML = `<h3 style="margin-bottom:16px;">تعديل مصروف</h3>
      <label>الاسم</label><input id="editExpName" value="${exp.name}">
      <label style="margin-top:8px;">القيمة</label><input id="editExpAmount" type="number" value="${exp.amount}" step="0.5">
      <label style="margin-top:8px;">تفاصيل</label><input id="editExpDetails" value="${exp.details || ''}">
      <div class="modal-buttons"><button class="btn btn-primary" onclick="window.saveExpenseEdit('${id}')">💾 حفظ</button><button class="btn btn-outline" onclick="closeModal()">إلغاء</button></div>`;
    document.getElementById('modalContainer').style.display = 'flex';
  };

  window.saveExpenseEdit = (id) => {
    const name = document.getElementById('editExpName')?.value.trim();
    const amount = parseFloat(document.getElementById('editExpAmount')?.value);
    const details = document.getElementById('editExpDetails')?.value.trim();
    if (!name || isNaN(amount) || amount <= 0) { showToast('⚠️ بيانات غير صحيحة', 'error'); return; }
    const data = loadAll();
    const exp = data.expenses.find(e => e.id === id);
    if (exp) { exp.name = name; exp.amount = amount; exp.details = details; save(STORAGE_KEYS.expenses, data.expenses); }
    closeModal();
    renderExpensesList();
    showToast('✅ تم التعديل');
  };

  window.deleteExpense = (id) => {
    if (!confirm('تأكيد حذف المصروف؟')) return;
    const data = loadAll();
    data.expenses = data.expenses.filter(e => e.id !== id);
    save(STORAGE_KEYS.expenses, data.expenses);
    renderExpensesList();
    showToast('🗑️ تم الحذف');
  };

  window.exportExpenses = () => {
    const expenses = loadAll().expenses;
    if (!expenses.length) { showToast('⚠️ لا توجد مصروفات', 'error'); return; }
    exportToExcel(expenses.map(e => ({
      'التاريخ': e.date,
      'الاسم': e.name,
      'القيمة': e.amount.toFixed(1),
      'التفاصيل': e.details || ''
    })), 'المصروفات.csv');
  };

  // ==================== ORDER PAGE ====================
  let currentCart = [];

  function renderOrder(container) {
    const data = loadAll();
    container.innerHTML = `
    <div class="card">
      <div class="card-header"><div class="icon-circle">🧾</div><div class="card-title">أوردر جديد</div></div>

        <div><label>نوع الأوردر</label><select id="orderType" onchange="window.onOrderTypeChange()"><option value="shop">🏪 محل</option><option value="restaurant">🏢 مطعم</option></select></div>

      </div>
      <div class="form-row">
        <div><label>رقم العميل</label><input id="orderCustomerPhone" placeholder="010xxxxxxxx"></div>
        <div><label>العنوان</label><input id="orderCustomerAddress" placeholder="العنوان"></div>
        <div><label>المندوب</label><select id="orderAgentSelect"><option value="">اختر المندوب</option>${data.agents.map(a => `<option value="${a.id}">${a.name}</option>`).join('')}</select></div>
      </div>
      <div class="form-row" style="background:var(--gray-50);padding:10px;border-radius:var(--radius);">
        <div><label>المنتج</label><select id="orderProductSelect">${data.prices.map(p => `<option value="${p.id}" data-shop="${p.shopPrice}" data-rest="${p.restPrice}">${p.name}</option>`).join('')}</select></div>
        <div><label>الوزن</label><select id="orderWeightSelect" onchange="window.toggleCustomWeight()"><option value="1">1 كيلو</option><option value="0.5">نصف كيلو</option><option value="0.25">ربع كيلو</option><option value="custom">وزن آخر (جرام)</option></select></div>
        <div id="customWeightDiv" style="display:none;min-width:90px;"><label>جرام</label><input id="orderWeightCustom" type="number" placeholder="مثال: 700"></div>

        <div style="min-width:auto;"><button class="btn btn-outline btn-sm" onclick="window.addToCart()" style="margin-top:4px;">➕ أضف</button></div>
      </div>
      <div style="margin:10px 0;" id="orderCart"><div class="empty-state">السلة فارغة</div></div>
      <div style="text-align:left;font-weight:700;">الإجمالي الفرعي: <span id="cartSubtotal">0</span> ج.م</div>
      <div class="form-row" style="margin-top:8px;">
        <div><label>🚚 التوصيل</label><input id="deliveryFee" type="number" value="0" step="0.5"></div>
        <div>
          <label>إضافة صنف إضافي</label>
          <div style="display:flex;gap:4px;">
            <input id="extraItemName" placeholder="اسم الصنف" style="flex:1;">
            <input id="extraItemPrice" type="number" placeholder="السعر" step="0.5" style="width:80px;">
            <button class="btn btn-outline btn-sm" onclick="window.addExtraToCart()">➕</button>
          </div>
        </div>
      </div>
      <div style="text-align:center;font-size:1.4rem;font-weight:900;color:var(--red);margin:10px 0;">🧾 الإجمالي الكلي: <span id="cartGrandTotal">0</span> ج.م</div>
      <button class="btn btn-green" onclick="window.confirmOrder()" style="width:100%;">✅ تأكيد الأوردر وإرسال واتساب</button>
    </div>`;
    document.getElementById('deliveryFee').addEventListener('input', updateCartDisplay);
  }

  window.onOrderTypeChange = () => {
    const type = document.getElementById('orderType')?.value;
    const div = document.getElementById('restaurantSelectDiv');
    if (div) div.style.display = type === 'restaurant' ? 'block' : 'none';
    updateCartDisplay();
  };

  window.onRestaurantSelect = () => {
    const id = document.getElementById('orderRestaurantSelect')?.value;
    if (!id) return;
    const r = loadAll().clients.find(c => c.id === id);
    if (r) {
      document.getElementById('orderCustomerPhone').value = r.phone;
      document.getElementById('orderCustomerAddress').value = r.address || '';
    }
  };

  window.toggleCustomWeight = () => {
    const val = document.getElementById('orderWeightSelect')?.value;
    const div = document.getElementById('customWeightDiv');
    if (div) div.style.display = val === 'custom' ? 'block' : 'none';
  };

  window.addToCart = () => {
    const type = document.getElementById('orderType')?.value;
    const prod = document.getElementById('orderProductSelect')?.selectedOptions[0];
    if (!prod) { showToast('⚠️ اختر منتجاً', 'error'); return; }
    const price = parseFloat(prod.getAttribute(type === 'shop' ? 'data-shop' : 'data-rest'));
    const weightSelect = document.getElementById('orderWeightSelect');
    let weight, weightLabel;
    if (weightSelect?.value === 'custom') {
      const customW = parseFloat(document.getElementById('orderWeightCustom')?.value);
      if (!customW || customW <= 0) { showToast('⚠️ أدخل وزناً صحيحاً', 'error'); return; }
      weight = customW / 1000;
      weightLabel = customW + ' جرام';
    } else {
      weight = parseFloat(weightSelect?.value || 1);
      weightLabel = weightSelect?.options[weightSelect?.selectedIndex]?.text || weight + ' ك';
    }
    const qty = parseInt(document.getElementById('orderQuantity')?.value) || 1;
    if (qty < 1) { showToast('⚠️ العدد غير صحيح', 'error'); return; }
    const total = price * weight * qty;
    currentCart.push({
      cartId: uuid(),
      productName: prod.text,
      unitPrice: price,
      weight,
      weightLabel,
      qty,
      total: parseFloat(total.toFixed(1)),
      isExtra: false
    });
    updateCartDisplay();
    showToast('✅ تمت الإضافة');
  };

  window.addExtraToCart = () => {
    const name = document.getElementById('extraItemName')?.value.trim();
    const price = parseFloat(document.getElementById('extraItemPrice')?.value);
    if (!name || isNaN(price) || price <= 0) { showToast('⚠️ بيانات غير صحيحة', 'error'); return; }
    currentCart.push({
      cartId: uuid(),
      productName: '➕ ' + name,
      unitPrice: price,
      weight: 1,
      weightLabel: '',
      qty: 1,
      total: parseFloat(price.toFixed(1)),
      isExtra: true
    });
    document.getElementById('extraItemName').value = '';
    document.getElementById('extraItemPrice').value = '';
    updateCartDisplay();
    showToast('✅ تمت الإضافة');
  };

  window.removeFromCart = (id) => {
    currentCart = currentCart.filter(c => c.cartId !== id);
    updateCartDisplay();
  };

  function updateCartDisplay() {
    const container = document.getElementById('orderCart');
    const subtotal = currentCart.reduce((s, c) => s + c.total, 0);
    const delivery = parseFloat(document.getElementById('deliveryFee')?.value) || 0;
    const subtotalEl = document.getElementById('cartSubtotal');
    const grandEl = document.getElementById('cartGrandTotal');
    if (subtotalEl) subtotalEl.textContent = subtotal.toFixed(1);
    if (grandEl) grandEl.textContent = (subtotal + delivery).toFixed(1);
    if (!container) return;
    if (currentCart.length === 0) {
      container.innerHTML = '<div class="empty-state">السلة فارغة</div>';
      return;
    }
    container.innerHTML = currentCart.map(c => {
      const detail = c.isExtra ? '' : ` (${c.weightLabel} ×${c.qty})`;
      return `<div class="cart-item">
        <span>${c.productName} ${detail}</span>
        <span style="font-weight:700;">${c.total.toFixed(1)} ج.م</span>
        <button class="btn btn-danger btn-xs" onclick="window.removeFromCart('${c.cartId}')">✖</button>
      </div>`;
    }).join('');
  }

  window.confirmOrder = () => {
    const type = document.getElementById('orderType')?.value;
    const phone = document.getElementById('orderCustomerPhone')?.value.trim();
    const address = document.getElementById('orderCustomerAddress')?.value.trim();
    const agentId = document.getElementById('orderAgentSelect')?.value;
    const delivery = parseFloat(document.getElementById('deliveryFee')?.value) || 0;
    if (!phone || !address || !agentId || currentCart.length === 0) {
      showToast('⚠️ أكمل جميع الحقول المطلوبة', 'error');
      return;
    }
    const agent = loadAll().agents.find(a => a.id === agentId);
    if (!agent) { showToast('⚠️ اختر مندوباً', 'error'); return; }
    const subtotal = currentCart.reduce((s, c) => s + c.total, 0);
    const grandTotal = subtotal + delivery;
    const invoiceId = 'INV-' + Math.floor(Math.random() * 100000);
    let restaurantId = null, restaurantName = '', restaurantPhone = '';
    if (type === 'restaurant') {
      restaurantId = document.getElementById('orderRestaurantSelect')?.value;
      const r = loadAll().clients.find(c => c.id === restaurantId);
      if (r) { restaurantName = r.name; restaurantPhone = r.phone; }
    }

    const order = {
      invoiceId,
      type,
      date: getNowString(),
      dateKey: getTodayString(),
      customerPhone: phone,
      customerAddress: address,
      agentId: agent.id,
      agentName: agent.name,
      agentPhone: agent.phone,
      restaurantId,
      restaurantName,
      restaurantPhone,
      cart: JSON.parse(JSON.stringify(currentCart)),
      subtotal: parseFloat(subtotal.toFixed(1)),
      deliveryFee: delivery,
      grandTotal: parseFloat(grandTotal.toFixed(1))
    };

    const data = loadAll();
    data.orders.unshift(order);
    save(STORAGE_KEYS.orders, data.orders);

    // رسالة واتساب للعميل
    const msg = `🧾 *فاتورة طيور الحلال*\n📅 ${order.date}\n🆔 ${order.invoiceId}\n━━━━━━━━━━\n${order.cart.map(c => `- ${c.productName} ${c.weightLabel} ×${c.qty}: ${c.total.toFixed(1)} ج.م`).join('\n')}\n🚚 توصيل: ${delivery.toFixed(1)}\n💰 *الإجمالي: ${grandTotal.toFixed(1)} ج.م*\n📍 ${address}\n🛵 المندوب: ${agent.name}`;

    // إذا كان مطعم: إظهار الفاتورة المنظمة وإرسالها
    if (type === 'restaurant') {
      showRestaurantInvoiceModal(order, msg);
    } else {
      // للعميل العادي: إرسال واتساب مباشرة
      window.open(`https://wa.me/${formatPhoneForWhatsapp(phone)}?text=${encodeURIComponent(msg)}`, '_blank');
      window.open(`https://wa.me/${formatPhoneForWhatsapp(agent.phone)}?text=${encodeURIComponent(`🚚 أوردر توصيل\n🆔 ${order.invoiceId}\n📍 ${address}\n📞 ${phone}\n💰 ${grandTotal.toFixed(1)} ج.م`)}`, '_blank');
      currentCart = [];
      renderOrder(document.getElementById('appContent'));
      showToast('✅ تم تأكيد الأوردر');
    }
  };

  function showRestaurantInvoiceModal(order, whatsappMsg) {
    const safeMsg = encodeURIComponent(whatsappMsg || '');

    const invoiceHTML = `
    <div id="restaurantInvoicePrint" class="restaurant-invoice">

        <div class="watermark">طيور الحلال</div>

        <div class="invoice-header">

            <div class="invoice-logo-wrapper">
                <img src="logo.png" alt="Logo" class="invoice-logo-img">
            </div>

            <div class="invoice-badge">
                فاتورة مطعم
            </div>

            <div class="invoice-info" style="margin-top:15px;">
                <span>📅 ${order.date || '-'}</span>
                <span>🆔 ${order.invoiceId || '-'}</span>
            </div>

            <div class="invoice-info">
                <span>🏢 ${order.restaurantName || 'مطعم'}</span>
                <span>📞 ${order.customerPhone || 'غير متوفر'}</span>
            </div>

            <div class="invoice-info">
                <span>🛵 ${order.agentName || 'غير محدد'}</span>
                <span>📍 ${order.customerAddress || 'غير متوفر'}</span>
            </div>

        </div>

        <table class="invoice-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>الصنف</th>
                    <th>كيلو</th>
                    <th>جرام</th>
                    <th>العدد</th>
                    <th>سعر الوحدة</th>
                    <th>الإجمالي</th>
                </tr>
            </thead>

            <tbody>
                ${order.cart.map((c, i) => {
                    const weight = Number(c.weight || 0);
                    const kg = c.isExtra ? '-' : Math.floor(weight);
                    const gram = c.isExtra ? '-' : Math.round((weight % 1) * 1000);

                    return `
                        <tr>
                            <td>${i + 1}</td>
                            <td style="text-align:right;">
                                ${c.productName || '-'}
                            </td>
                            <td>${kg}</td>
                            <td>${gram}</td>
                            <td>${c.qty || 0}</td>
                            <td>${(c.unitPrice || 0).toFixed(1)} ج</td>
                            <td>
                                ${(c.total || 0).toFixed(1)} ج
                            </td>
                        </tr>
                    `;
                }).join('')}
            </tbody>

            <tfoot>
                <tr>
                    <td colspan="6">الإجمالي الفرعي</td>
                    <td>${(order.subtotal || 0).toFixed(1)} ج</td>
                </tr>

                ${(order.deliveryFee || 0) > 0 ? `
                    <tr>
                        <td colspan="6">رسوم التوصيل</td>
                        <td>${order.deliveryFee.toFixed(1)} ج</td>
                    </tr>
                ` : ''}

                <tr class="grand-total-row">
                    <td colspan="6">
                        <strong>الإجمالي الكلي</strong>
                    </td>
                    <td>
                        ${(order.grandTotal || 0).toFixed(1)} ج
                    </td>
                </tr>
            </tfoot>
        </table>

        <div class="invoice-footer">
            شكراً لتعاملكم معنا ❤️
        </div>

    </div>
    `;

    document.getElementById('modalContent').innerHTML = `
        <h3 style="margin-bottom:15px;">فاتورة الطلب</h3>

        ${invoiceHTML}

        <div class="modal-buttons">
            <button class="btn btn-blue" onclick="captureInvoice()">
                تحميل كصورة
            </button>

            <button class="btn btn-green"
                onclick="sendRestaurantWhatsApp(
                    '${safeMsg}',
                    '${order.customerPhone || ''}',
                    '${order.agentPhone || ''}',
                    '${order.restaurantPhone || ''}'
                )">
                إرسال واتساب
            </button>

            <button class="btn btn-outline"
                onclick="closeAndResetOrder()">
                إغلاق
            </button>
        </div>
    `;

    document.getElementById('modalContainer').style.display = 'flex';
}


window.captureInvoice = () => {
    const invoiceEl = document.getElementById('restaurantInvoicePrint');

    if (!invoiceEl) {
        showToast('الفاتورة غير موجودة');
        return;
    }

    if (typeof captureElement !== 'function') {
        showToast('ميزة التصوير غير متاحة');
        return;
    }

    captureElement(
        invoiceEl,
        `فاتورة_${Date.now()}.png`
    );
};

  window.sendRestaurantWhatsApp = (msg, phone, agentPhone, restPhone) => {
    window.open(`https://wa.me/${formatPhoneForWhatsapp(phone)}?text=${msg}`, '_blank');
    if (restPhone) window.open(`https://wa.me/${formatPhoneForWhatsapp(restPhone)}?text=${msg}`, '_blank');
    window.open(`https://wa.me/${formatPhoneForWhatsapp(agentPhone)}?text=${encodeURIComponent('🚚 أوردر توصيل مطعم')}`, '_blank');
  };

  window.closeAndResetOrder = () => {
    currentCart = [];
    closeModal();
    renderOrder(document.getElementById('appContent'));
    showToast('✅ تم تأكيد الأوردر');
  };

  // ==================== RECORDS & DAILY ====================
  function renderRecords(container) {
    container.innerHTML = `<div class="card">
      <div class="tabs" id="recordsTabs">
        <button class="tab-btn active" data-tab="invoices"> فواتير</button>
        <button class="tab-btn" data-tab="expenses"> مصروفات</button>
        <button class="tab-btn" data-tab="clients"> عملاء</button>
        <button class="tab-btn" data-tab="profits"> أرباح</button>
        <button class="tab-btn" data-tab="consumables"> مستهلكات</button>
      </div>
      <div id="recordsTabContent"></div>
    </div>`;
    document.getElementById('recordsTabs').addEventListener('click', e => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      document.querySelectorAll('#recordsTabs .tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderRecordTab(btn.dataset.tab);
    });
    renderRecordTab('invoices');
  }

  function renderRecordTab(tab) {
    const content = document.getElementById('recordsTabContent');
    if (!content) return;
    content.innerHTML = `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
      <input type="date" id="recFilterDate" onchange="window.refreshRecordTab('${tab}')" style="flex:1;min-width:130px;">
      <input id="recFilterSearch" placeholder="🔍 بحث..." oninput="window.refreshRecordTab('${tab}')" style="flex:1;min-width:130px;">
      <button class="btn btn-export btn-sm" onclick="window.exportRecordTab('${tab}')">📥 تصدير Excel</button>
    </div><div id="recTabList"></div>`;
    refreshRecordTab(tab);
  }

  window.refreshRecordTab = function(tab) {
    const data = loadAll();
    const date = document.getElementById('recFilterDate')?.value;
    const search = (document.getElementById('recFilterSearch')?.value || '').toLowerCase();
    let items = [];
    if (tab === 'invoices') items = data.orders;
    else if (tab === 'expenses') items = data.expenses;
    else if (tab === 'clients') items = data.clients;
    else if (tab === 'consumables') items = data.inventoryLog;
    else if (tab === 'profits') { renderProfitTab(date); return; }
    if (date) items = items.filter(i => (i.dateKey || '') === date);
    if (search) items = items.filter(i => JSON.stringify(i).toLowerCase().includes(search));
    const list = document.getElementById('recTabList');
    if (!list) return;
    if (!items.length) {
      list.innerHTML = '<div class="empty-state">لا توجد بيانات</div>';
      return;
    }
    if (tab === 'invoices') {
      list.innerHTML = items.map(o => `<div class="invoice-card" onclick="this.classList.toggle('expanded')">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">
          <div><strong>${o.invoiceId}</strong> - ${o.date}</div>
          <span class="badge badge-red">${o.grandTotal.toFixed(1)} ج.م</span>
        </div>
        <div class="invoice-details">
          ${o.cart.map(c => `<div>• ${c.productName} ${c.weightLabel} ×${c.qty} = ${c.total.toFixed(1)} ج.م</div>`).join('')}
          <div style="margin-top:4px;">🚚 توصيل: ${o.deliveryFee.toFixed(1)} | 🛵 ${o.agentName}</div>
          <div style="font-weight:900;">💰 الإجمالي: ${o.grandTotal.toFixed(1)} ج.م</div>
        </div>
      </div>`).join('');
    } else if (tab === 'expenses') {
      list.innerHTML = items.map(e => `<div class="item-row"><div><strong>💸 ${e.name}</strong> ${e.details||''} - ${e.date}</div><div style="font-weight:700;">${e.amount.toFixed(1)} ج.م</div></div>`).join('');
    } else if (tab === 'clients') {
      list.innerHTML = items.map(c => `<div class="item-row"><div>${c.type==='restaurant'?'🏢':'👤'} <strong>${c.name}</strong> 📞 ${c.phone} ${c.address?'📍 '+c.address:''}</div></div>`).join('');
    } else if (tab === 'consumables') {
      list.innerHTML = items.map(log => `<div class="item-row"><div>📦 ${log.itemName} (${log.action}) ${log.quantityBefore} ➜ ${log.quantityAfter} - ${log.date}</div></div>`).join('');
    }
  };

  function renderProfitTab(date) {
    const data = loadAll();
    const orders = date ? data.orders.filter(o => o.dateKey === date) : data.orders;
    const expenses = date ? data.expenses.filter(e => e.dateKey === date) : data.expenses;
    const income = orders.reduce((s, o) => s + o.grandTotal, 0);
    const expense = expenses.reduce((s, e) => s + e.amount, 0);
    const profit = income - expense;
    const list = document.getElementById('recTabList');
    if (!list) return;
    list.innerHTML = `<div class="stat-row">
      <div class="stat-card"><div class="stat-value">${income.toFixed(1)}</div><div class="stat-label">💰 إيرادات</div></div>
      <div class="stat-card"><div class="stat-value">${expense.toFixed(1)}</div><div class="stat-label">💸 مصروفات</div></div>
      <div class="stat-card"><div class="stat-value" style="color:${profit >= 0 ? 'var(--green)' : '#ef4444'};">${profit.toFixed(1)}</div><div class="stat-label">📈 صافي</div></div>
    </div>`;
  }

  window.exportRecordTab = function(tab) {
    const data = loadAll();
    const date = document.getElementById('recFilterDate')?.value;
    let items = [], filename = '';
    if (tab === 'invoices') { items = data.orders; filename = 'فواتير.csv'; }
    else if (tab === 'expenses') { items = data.expenses; filename = 'مصروفات.csv'; }
    else if (tab === 'clients') { items = data.clients; filename = 'عملاء.csv'; }
    else if (tab === 'consumables') { items = data.inventoryLog; filename = 'حركة_المخزن.csv'; }
    if (date) items = items.filter(i => (i.dateKey || '') === date);
    if (!items.length) { showToast('⚠️ لا توجد بيانات', 'error'); return; }
    const exportItems = items.map(i => {
      const row = {};
      if (tab === 'invoices') {
        row['رقم الفاتورة'] = i.invoiceId || '';
        row['التاريخ'] = i.date || '';
        row['العميل'] = i.customerPhone || '';
        row['المندوب'] = i.agentName || '';
        row['الإجمالي'] = i.grandTotal || '';
      } else if (tab === 'expenses') {
        row['التاريخ'] = i.date || '';
        row['الاسم'] = i.name || '';
        row['القيمة'] = i.amount || '';
        row['التفاصيل'] = i.details || '';
      } else if (tab === 'clients') {
        row['النوع'] = i.type === 'restaurant' ? 'مطعم' : 'عميل';
        row['الاسم'] = i.name || '';
        row['الهاتف'] = i.phone || '';
        row['العنوان'] = i.address || '';
      } else {
        row['التاريخ'] = i.date || '';
        row['الصنف'] = i.itemName || '';
        row['النوع'] = i.type || '';
        row['الكمية قبل'] = i.quantityBefore || '';
        row['الكمية بعد'] = i.quantityAfter || '';
        row['الإجراء'] = i.action || '';
      }
      return row;
    });
    exportToExcel(exportItems, filename);
  };

  function renderDaily(container) {
    const today = getTodayString();
    const data = loadAll();
    const orders = data.orders.filter(o => o.dateKey === today);
    const expenses = data.expenses.filter(e => e.dateKey === today);
    const income = orders.reduce((s, o) => s + o.grandTotal, 0);
    const expense = expenses.reduce((s, e) => s + e.amount, 0);
    container.innerHTML = `
    <div class="card" id="dailyReportCard">
      <div style="text-align:center;margin-bottom:16px;">
        <div style="font-size:1.5rem;font-weight:900;color:var(--red);">📊 إجمالي اليوم</div>
        <div style="color:var(--gray-500);">${today}</div>
      </div>
      <div class="stat-row">
        <div class="stat-card"><div class="stat-value">${orders.length}</div><div class="stat-label">🧾 أوردرات</div></div>
        <div class="stat-card"><div class="stat-value">${income.toFixed(1)}</div><div class="stat-label">💰 مبيعات</div></div>
        <div class="stat-card"><div class="stat-value">${expense.toFixed(1)}</div><div class="stat-label">💸 مصروفات</div></div>
        <div class="stat-card"><div class="stat-value" style="color:${income - expense >= 0 ? 'var(--green)' : '#ef4444'};">${(income - expense).toFixed(1)}</div><div class="stat-label">📈 صافي</div></div>
      </div>
      <div style="text-align:center;margin-top:20px;">
        <button class="btn btn-blue" onclick="window.captureDailyReport()">📸 تحميل التقرير كصورة</button>
      </div>
    </div>`;
  }

  window.captureDailyReport = () => {
    const el = document.getElementById('dailyReportCard');
    if (el) {
      captureElement(el, `تقرير_${getTodayString()}.png`);
    }
  };

  function checkDailyReset() {
    const today = getTodayString();
    const data = loadAll();
    if (data.dailyDate !== today) {
      localStorage.setItem(STORAGE_KEYS.dailyDate, today);
    }
  }

  // ==================== INIT ====================
  document.addEventListener('DOMContentLoaded', () => {
    initOTP();
  });

  // Override closeModal for X button on overlay
  document.getElementById('modalContainer').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

})();
</script>
</body>
</html>
